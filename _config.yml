# Site settings
title: "Zurfishan - Computer Engineering Student"
author: "Zurfishan"
description: "Computer Engineering student sharing my journey, projects, and insights"
permalink: /:title/
lang: "en"
excerpt_separator: "\n\n\n"
date_format: "%B %d, %Y"

# Layout settings
show_excerpts: true             # show article excerpts on home page
show_frame: true                # display a grey frame on large screens
show_sidebar: false             # show a sidebar instead of the usual header
show_minimal: false             # remove all clutter

# Navigation menu
navigation:
  - {file: "archive.html", title: "Archive", icon: archive, sidebaricon: home}
  - {file: "README.md", title: "About Me", icon: user, sidebaricon: address-card}
 

# External links (social/professional)
external:
  - {title: Email, icon: envelope, url: "mailto:zurfishan.email@gmail.com"}  # CHANGE THIS
  - {title: GitHub, icon: github, url: "https://github.com/zurfishan"}
  - {title: LinkedIn, icon: linkedin, url: "https://linkedin.com/in/zurfishan"}  # ADD YOUR LINK
  - {title: Subscribe, icon: rss, url: "/feed.xml"}

# Comments (optional - leave disabled for now)
comments:
#  disqus_shortname: ""
#  isso_domain: ""

# Plugins
plugins:
  - jekyll-feed
